<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- adtini SEO Quote Tool — Vici brand: Atlas Blue field, Vici Gold mark -->
  <rect width="64" height="64" rx="14" fill="#002D58"/>
  <!-- rising rank bars (parchment, gold accent on the winner) -->
  <rect x="13" y="36" width="7" height="13" rx="2" fill="#FDFBF7" opacity=".55"/>
  <rect x="24" y="28" width="7" height="21" rx="2" fill="#FDFBF7" opacity=".8"/>
  <rect x="35" y="19" width="7" height="30" rx="2" fill="#F1B434"/>
  <!-- magnifying glass over the top bar: search -> rank -->
  <circle cx="42" cy="22" r="11.5" fill="none" stroke="#FDFBF7" stroke-width="4"/>
  <line x1="50" y1="30" x2="57" y2="37" stroke="#FDFBF7" stroke-width="5" stroke-linecap="round"/>
  <!-- gold dollar tick inside the lens: the quote -->
  <text x="42" y="27" font-family="Barlow, Arial, sans-serif" font-size="14" font-weight="700"
        fill="#F1B434" text-anchor="middle">$</text>
</svg>
