services:
  - type: web
    name: seo-quote-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --worker-class gthread --workers 1 --threads 8
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DFS_LOGIN
        sync: false
      - key: DFS_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # DATABASE_URL is set automatically by Render when you attach a Postgres
      # instance. Optional — without it, the tool runs fine and saving is disabled.
      - key: DATABASE_URL
        sync: false
