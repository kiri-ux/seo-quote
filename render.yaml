services:
  - type: web
    name: seo-quote-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --workers 1 --threads 4
    envVars:
      - key: DFS_LOGIN
        sync: false
      - key: DFS_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
